name: Update manifest

on:
  workflow_dispatch:
    inputs:
      url:
        description: Download URL of the .phar file.
        required: true
      version:
        description: Version number (e.g. 8.115.0).
        required: true
      hash:
        description: SHA-1 hash (raw hex value, without the "sha1:" prefix).
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Scoop manifest
        uses: ./.github/actions/update-manifest
        with:
          url: ${{ inputs.url }}
          version: ${{ inputs.version }}
          hash: ${{ inputs.hash }}
